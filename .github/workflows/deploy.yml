name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: eu-west-2
  AWS_ACCOUNT_ID: "562675430068"
  ECR_REPOSITORY: metabookly-api
  APP_RUNNER_SERVICE_NAME: metabookly-api

jobs:

  # ── PR checks (pull requests only) ─────────────────────────────────────────
  pr-check:
    name: PR Checks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: metabookly
          POSTGRES_PASSWORD: metabookly
          POSTGRES_DB: metabookly_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Install CDK dependencies
        working-directory: infra
        run: npm ci

      - name: CDK synth (validate infrastructure compiles)
        working-directory: infra
        run: npx cdk synth --all --quiet

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install API dependencies
        working-directory: apps/api
        run: pip install -e ".[dev]"

      - name: Run migrations against test DB
        working-directory: apps/api
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://metabookly:metabookly@localhost:5432/metabookly_test

      - name: Run API tests
        working-directory: apps/api
        run: pytest --tb=short -q
        env:
          DATABASE_URL: postgresql+asyncpg://metabookly:metabookly@localhost:5432/metabookly_test
          TEST_DATABASE_URL: postgresql+asyncpg://metabookly:metabookly@localhost:5432/metabookly_test

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build frontend (type-check + lint)
        working-directory: apps/web
        run: npm run build

  # ── Test (main branch pushes only) ─────────────────────────────────────────
  test:
    name: Test API
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: metabookly
          POSTGRES_PASSWORD: metabookly
          POSTGRES_DB: metabookly_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install API dependencies
        working-directory: apps/api
        run: pip install -e ".[dev]"

      - name: Run migrations against test DB
        working-directory: apps/api
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://metabookly:metabookly@localhost:5432/metabookly_test

      - name: Run tests
        working-directory: apps/api
        run: pytest --tb=short -q
        env:
          DATABASE_URL: postgresql+asyncpg://metabookly:metabookly@localhost:5432/metabookly_test
          TEST_DATABASE_URL: postgresql+asyncpg://metabookly:metabookly@localhost:5432/metabookly_test

  # ── Deploy storage infrastructure (CDK) ────────────────────────────────────
  # MetabooklyStorage includes the ECR repo. Must run before build so the repo
  # exists when we try to push. App Runner service (MetabooklyApi) deploys after.
  storage-infra:
    name: Deploy Storage Infrastructure (CDK)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install CDK dependencies
        working-directory: infra
        run: npm ci

      - name: CDK deploy Storage (creates ECR repo)
        working-directory: infra
        run: npx cdk deploy MetabooklyStorage --require-approval never

  # ── Build & push image ──────────────────────────────────────────────────────
  build:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    needs: [storage-infra]
    outputs:
      image_uri: ${{ steps.build-push.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build-push
        working-directory: apps/api
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:sha-${{ github.sha }}
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI
          docker tag $IMAGE_URI $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

  # ── Deploy API infrastructure (CDK) ────────────────────────────────────────
  # MetabooklyApi (App Runner service) deploys after the image is in ECR.
  infrastructure:
    name: Deploy API Infrastructure (CDK)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install CDK dependencies
        working-directory: infra
        run: npm ci

      - name: CDK deploy Api (App Runner service)
        working-directory: infra
        run: npx cdk deploy MetabooklyApi --require-approval never

  # ── Deploy to App Runner ────────────────────────────────────────────────────
  deploy:
    name: Deploy to App Runner
    runs-on: ubuntu-latest
    needs: [build, infrastructure]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger App Runner deployment and wait
        run: |
          SERVICE_ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='$APP_RUNNER_SERVICE_NAME'].ServiceArn" \
            --output text)

          if [ -z "$SERVICE_ARN" ]; then
            echo "Error: App Runner service '$APP_RUNNER_SERVICE_NAME' not found"
            exit 1
          fi

          echo "Deploying to: $SERVICE_ARN"

          OPERATION_ID=$(aws apprunner start-deployment \
            --service-arn "$SERVICE_ARN" \
            --query "OperationId" \
            --output text)

          echo "Operation ID: $OPERATION_ID"

          # Poll for completion (max 10 minutes, 30s intervals)
          for i in $(seq 1 20); do
            STATUS=$(aws apprunner list-operations \
              --service-arn "$SERVICE_ARN" \
              --query "OperationSummaryList[?Id=='$OPERATION_ID'].Status" \
              --output text)
            echo "[$i/20] Status: $STATUS"
            if [ "$STATUS" = "SUCCEEDED" ]; then
              echo "Deployment succeeded"
              exit 0
            elif [[ "$STATUS" == "FAILED" || "$STATUS" == "ROLLBACK_SUCCEEDED" || "$STATUS" == "ROLLBACK_FAILED" ]]; then
              echo "Deployment failed with status: $STATUS"
              exit 1
            fi
            sleep 30
          done

          echo "Timed out waiting for deployment to complete"
          exit 1
