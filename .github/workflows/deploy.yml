name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: eu-west-2
  AWS_ACCOUNT_ID: "562675430068"
  ECR_REPOSITORY: metabookly-api
  ECS_CLUSTER: metabookly
  ECS_SERVICE: metabookly-api
  ECS_TASK_FAMILY: metabookly-api

jobs:

  # ── PR checks (pull requests only) ─────────────────────────────────────────
  pr-check:
    name: PR Checks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: metabookly
          POSTGRES_PASSWORD: metabookly
          POSTGRES_DB: metabookly_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Install CDK dependencies
        working-directory: infra
        run: npm ci

      - name: CDK synth (validate infrastructure compiles)
        working-directory: infra
        run: npx cdk synth --all --quiet

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install API dependencies
        working-directory: apps/api
        run: pip install -e ".[dev]"

      - name: Run migrations against test DB
        working-directory: apps/api
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://metabookly:metabookly@localhost:5432/metabookly_test

      - name: Run API tests
        working-directory: apps/api
        run: pytest --tb=short -q
        env:
          DATABASE_URL: postgresql+asyncpg://metabookly:metabookly@localhost:5432/metabookly_test

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build frontend (type-check + lint)
        working-directory: apps/web
        run: npm run build

  # ── Test (main branch pushes only) ─────────────────────────────────────────
  test:
    name: Test API
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: metabookly
          POSTGRES_PASSWORD: metabookly
          POSTGRES_DB: metabookly_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install API dependencies
        working-directory: apps/api
        run: pip install -e ".[dev]"

      - name: Run migrations against test DB
        working-directory: apps/api
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://metabookly:metabookly@localhost:5432/metabookly_test

      - name: Run tests
        working-directory: apps/api
        run: pytest --tb=short -q
        env:
          DATABASE_URL: postgresql+asyncpg://metabookly:metabookly@localhost:5432/metabookly_test

  # ── Build & push image ──────────────────────────────────────────────────────
  build:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      image_uri: ${{ steps.build-push.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build-push
        working-directory: apps/api
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:sha-${{ github.sha }}
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI
          docker tag $IMAGE_URI $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

  # ── Deploy infrastructure ───────────────────────────────────────────────────
  infrastructure:
    name: Deploy Infrastructure (CDK)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install CDK dependencies
        working-directory: infra
        run: npm ci

      - name: CDK deploy
        working-directory: infra
        run: npx cdk deploy --all --require-approval never

  # ── Deploy API to ECS ───────────────────────────────────────────────────────
  deploy:
    name: Deploy API to ECS
    runs-on: ubuntu-latest
    needs: [build, infrastructure]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $ECS_TASK_FAMILY \
            --query taskDefinition \
            > task-definition.json

      - name: Update task definition image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: api
          image: ${{ needs.build.outputs.image_uri }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 5
